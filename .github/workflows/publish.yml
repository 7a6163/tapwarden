name: Publish

# Publishes to crates.io on a version tag push (e.g. `v0.1.1`).
# Auth uses a crates.io API token stored as the CARGO_REGISTRY_TOKEN secret.
# One-time setup: crates.io → Account Settings → API Tokens → create a token
# scoped to publish, then add it in GitHub → repo Settings → Secrets and
# variables → Actions → New repository secret named CARGO_REGISTRY_TOKEN.

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    # macOS: the apple-native keychain and LocalAuthentication paths only
    # compile there, so the crate is built and verified on macOS. Touch ID /
    # live-server tests are #[ignore]d, so this suite needs no prompts/network.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Verify tag matches Cargo.toml version
        run: |
          version=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')
          tag="${GITHUB_REF_NAME#v}"
          echo "Cargo.toml version: $version | tag: $tag"
          if [ "$version" != "$tag" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match Cargo.toml version $version"
            exit 1
          fi
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Test
        run: cargo test --locked
      - name: Build (release)
        run: cargo build --locked --release

  publish:
    needs: verify
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    needs: [verify, publish]
    runs-on: macos-latest # native aarch64-apple-darwin runner; no cross-compile
    permissions:
      contents: write # required to create the GitHub Release
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --locked --release
      - name: Package binary + checksum
        run: |
          mkdir -p dist
          name="sigilo-${GITHUB_REF_NAME}-aarch64-apple-darwin"
          cp target/release/sigilo "dist/$name"
          (cd dist && shasum -a 256 "$name" > "$name.sha256")
      - name: Extract changelog section for this version
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes=$(awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$notes"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*
